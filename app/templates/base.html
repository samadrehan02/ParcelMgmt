<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Parcel Management System{% endblock %}</title>

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Main Styles -->
    <link rel="stylesheet" href="/static/css/style.css">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <i class="fas fa-box-open"></i>
            <span>ParcelMgmt</span>
        </a>

        <ul class="navbar-nav" id="main-nav">
            <li><a href="/" class="nav-link" data-nav="home"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="/track" class="nav-link" data-nav="track"><i class="fas fa-search-location"></i> Track Parcel</a></li>
        </ul>

        <div class="nav-right" id="auth-nav">
            <a href="/login" class="btn btn-secondary">
                <i class="fas fa-sign-in-alt"></i> Login
            </a>
            <a href="/register" class="btn btn-primary">
                <i class="fas fa-user-plus"></i> Register
            </a>
        </div>

        <button class="mobile-menu-toggle" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Alert Container for Toast Notifications -->
    <div id="global-alert-container" class="alert-container"></div>

    <!-- Main JavaScript -->
    <script src="/static/js/main.js"></script>

    {% block extra_js %}{% endblock %}

    <!-- Service Worker for PWA capabilities (optional enhancement) -->
    <script>
        // Add subtle page transition effect
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.3s ease';
            requestAnimationFrame(() => {
                document.body.style.opacity = '1';
            });
        });

        // Handle mobile menu toggle
        const mobileMenuToggle = document.querySelector('.mobile-menu-toggle');
        const navbarNav = document.querySelector('.navbar-nav');

        if (mobileMenuToggle && navbarNav) {
            mobileMenuToggle.addEventListener('click', () => {
                mobileMenuToggle.classList.toggle('active');
                navbarNav.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
