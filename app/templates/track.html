{% extends "base.html" %}

{% block title %}Track Parcel - Parcel Management System{% endblock %}

{% block content %}
<div class="container">
    <!-- Search Section -->
    <div class="card reveal" style="margin-top: 2rem; text-align: center;">
        <div style="max-width: 600px; margin: 0 auto;">
            <div style="
                width: 90px;
                height: 90px;
                margin: 0 auto 1.5rem;
                background: linear-gradient(135deg, #f59e0b, #fbbf24);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2.5rem;
                color: white;
                box-shadow: 0 0 30px rgba(245, 158, 11, 0.4);
                animation: float 3s ease-in-out infinite;
            ">
                <i class="fas fa-search-location"></i>
            </div>
            <h1 style="font-size: 2rem; font-weight: 800; color: var(--dark-color); margin-bottom: 0.5rem;">
                Track Your Parcel
            </h1>
            <p style="color: var(--secondary-color); margin-bottom: 2rem;">
                Enter your tracking number to see the latest status and location
            </p>
        </div>

        <div id="alert-container"></div>

        <form id="track-form" style="max-width: 500px; margin: 0 auto;">
            <div class="search-box" style="margin-bottom: 0;">
                <div style="flex: 1; position: relative;">
                    <i class="fas fa-barcode" style="
                        position: absolute;
                        left: 1.25rem;
                        top: 50%;
                        transform: translateY(-50%);
                        color: var(--secondary-color);
                        font-size: 1.25rem;
                    "></i>
                    <input type="text" id="tracking_number" name="tracking_number"
                        placeholder="Enter tracking number (e.g., TRK123456789ABC)"
                        required
                        style="
                            width: 100%;
                            padding: 1rem 1.25rem 1rem 3rem;
                            border: 2px solid var(--border-color);
                            border-radius: var(--radius-full);
                            font-size: 1rem;
                            transition: all 0.3s ease;
                        "
                    >
                </div>
                <button type="submit" class="btn btn-primary" style="border-radius: var(--radius-full); padding: 1rem 2rem;">
                    <i class="fas fa-search"></i> Track
                </button>
            </div>
        </form>

        <!-- Recent Searches -->
        <div id="recent-searches" style="margin-top: 1.5rem; display: none;">
            <p style="color: var(--secondary-color); font-size: 0.9rem; margin-bottom: 0.5rem;">Recent searches:</p>
            <div id="recent-searches-list" style="display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;">
            </div>
        </div>
    </div>

    <!-- Results Section -->
    <div id="tracking-results"></div>
</div>

<style>
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.status-step {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out forwards;
}

.status-step:nth-child(1) { animation-delay: 0.1s; }
.status-step:nth-child(2) { animation-delay: 0.2s; }
.status-step:nth-child(3) { animation-delay: 0.3s; }
.status-step:nth-child(4) { animation-delay: 0.4s; }
.status-step:nth-child(5) { animation-delay: 0.5s; }

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
// Load recent searches from localStorage
const RECENT_SEARCHES_KEY = 'parcel_recent_searches';
const MAX_RECENT_SEARCHES = 5;

document.addEventListener('DOMContentLoaded', () => {
    // Check for tracking number in URL
    const urlParams = new URLSearchParams(window.location.search);
    const trackingNumber = urlParams.get('number');

    if (trackingNumber) {
        document.getElementById('tracking_number').value = trackingNumber;
        trackParcel(trackingNumber);
    }

    // Load and display recent searches
    loadRecentSearches();
});

document.getElementById('track-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const trackingNumber = document.getElementById('tracking_number').value.trim();
    if (trackingNumber) {
        trackParcel(trackingNumber);
    }
});

function loadRecentSearches() {
    const searches = JSON.parse(localStorage.getItem(RECENT_SEARCHES_KEY) || '[]');
    const container = document.getElementById('recent-searches');
    const list = document.getElementById('recent-searches-list');

    if (searches.length === 0) {
        container.style.display = 'none';
        return;
    }

    container.style.display = 'block';
    list.innerHTML = searches.map(num => `
        <button onclick="trackParcel('${num}'); document.getElementById('tracking_number').value = '${num}';"
            style="
                padding: 0.5rem 1rem;
                background: var(--light-color);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-full);
                font-size: 0.85rem;
                cursor: pointer;
                transition: all 0.2s ease;
                color: var(--secondary-color);
            "
            onmouseover="this.style.background='var(--primary-color)'; this.style.color='white'; this.style.borderColor='var(--primary-color)';"
            onmouseout="this.style.background='var(--light-color)'; this.style.color='var(--secondary-color)'; this.style.borderColor='var(--border-color)';"
        >
            <i class="fas fa-history"></i> ${num}
        </button>
    `).join('');
}

function addToRecentSearches(trackingNumber) {
    let searches = JSON.parse(localStorage.getItem(RECENT_SEARCHES_KEY) || '[]');
    // Remove if already exists
    searches = searches.filter(s => s !== trackingNumber);
    // Add to beginning
    searches.unshift(trackingNumber);
    // Keep only max
    searches = searches.slice(0, MAX_RECENT_SEARCHES);
    localStorage.setItem(RECENT_SEARCHES_KEY, JSON.stringify(searches));
    loadRecentSearches();
}

async function trackParcel(trackingNumber) {
    const token = localStorage.getItem('token');
    const resultsContainer = document.getElementById('tracking-results');

    // Show loading
    resultsContainer.innerHTML = `
        <div class="card" style="margin-top: 2rem;">
            <div class="loading-pulse" style="padding: 3rem;">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <p style="text-align: center; color: var(--secondary-color); margin-bottom: 2rem;">Tracking your parcel...</p>
        </div>
    `;

    try {
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const response = await fetch(`/api/parcels/track/${trackingNumber}`, { headers });

        if (response.ok) {
            const parcel = await response.json();
            addToRecentSearches(trackingNumber);
            displayTrackingResults(parcel);
        } else if (response.status === 404) {
            resultsContainer.innerHTML = `
                <div class="card reveal" style="margin-top: 2rem; text-align: center; padding: 3rem;">
                    <div style="font-size: 5rem; color: var(--border-color); margin-bottom: 1.5rem;">
                        <i class="fas fa-box-open" style="animation: float 3s ease-in-out infinite;"></i>
                    </div>
                    <h3 style="font-size: 1.5rem; font-weight: 700; color: var(--dark-color); margin-bottom: 0.5rem;">Parcel Not Found</h3>
                    <p style="color: var(--secondary-color); margin-bottom: 1.5rem;">
                        We couldn't find a parcel with tracking number:<br>
                        <strong style="font-family: var(--font-mono); color: var(--dark-color);">${trackingNumber}</strong>
                    </p>
                    <button class="btn btn-primary" onclick="document.getElementById('tracking_number').focus();">
                        <i class="fas fa-search"></i> Try Again
                    </button>
                </div>
            `;
        } else if (response.status === 403) {
            showAlert('You are not authorized to track this parcel. Please login.', 'warning');
            resultsContainer.innerHTML = '';
        }
    } catch (error) {
        console.error('Error tracking parcel:', error);
        resultsContainer.innerHTML = `
            <div class="card reveal" style="margin-top: 2rem; text-align: center; padding: 3rem;">
                <div style="font-size: 5rem; color: var(--danger-color); margin-bottom: 1.5rem;">
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <h3 style="font-size: 1.5rem; font-weight: 700; color: var(--dark-color); margin-bottom: 0.5rem;">Error</h3>
                <p style="color: var(--secondary-color); margin-bottom: 1.5rem;">An error occurred while tracking your parcel. Please try again.</p>
                <button class="btn btn-primary" onclick="trackParcel('${trackingNumber}')">
                    <i class="fas fa-sync"></i> Retry
                </button>
            </div>
        `;
    }
}

function displayTrackingResults(parcel) {
    const container = document.getElementById('tracking-results');

    const statusSteps = [
        { status: 'pending', label: 'Pending', icon: 'fa-clock', description: 'Order received' },
        { status: 'picked_up', label: 'Picked Up', icon: 'fa-hand-holding', description: 'Parcel collected' },
        { status: 'in_transit', label: 'In Transit', icon: 'fa-truck', description: 'On the way' },
        { status: 'out_for_delivery', label: 'Out for Delivery', icon: 'fa-shipping-fast', description: 'Arriving today' },
        { status: 'delivered', label: 'Delivered', icon: 'fa-check-circle', description: 'Successfully delivered' }
    ];

    const currentStepIndex = statusSteps.findIndex(s => s.status === parcel.status);

    container.innerHTML = `
        <!-- Status Progress -->
        <div class="card reveal" style="margin-top: 2rem;">
            <div class="card-header" style="flex-wrap: wrap; gap: 1rem;">
                <div>
                    <span class="badge badge-${parcel.status}" style="font-size: 1rem; padding: 0.5rem 1rem;">
                        <i class="fas ${getStatusIcon(parcel.status)}"></i>
                        ${formatStatus(parcel.status)}
                    </span>
                    <p style="margin-top: 0.75rem; color: var(--secondary-color);">
                        Tracking #: <strong style="font-family: var(--font-mono); color: var(--dark-color);">${parcel.tracking_number}</strong>
                    </p>
                </div>
                <div style="text-align: right;">
                    <p style="font-size: 0.875rem; color: var(--secondary-color); margin-bottom: 0.25rem;">Estimated Delivery</p>
                    <p style="font-weight: 700; color: var(--dark-color);">
                        <i class="fas fa-calendar-alt" style="color: var(--primary-color); margin-right: 0.5rem;"></i>
                        ${parcel.estimated_delivery || 'Calculating...'}
                    </p>
                </div>
            </div>

            <div class="status-progress" style="padding: 2rem 0;">
                ${statusSteps.map((step, index) => {
                    const isCompleted = index <= currentStepIndex;
                    const isCurrent = index === currentStepIndex;
                    return `
                        <div class="status-step ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''}">
                            <div class="status-step-icon" style="
                                width: 60px;
                                height: 60px;
                                border-radius: 50%;
                                background: ${isCompleted ? 'var(--primary-gradient)' : 'white'};
                                border: 3px solid ${isCompleted ? 'var(--primary-color)' : 'var(--border-color)'};
                                color: ${isCompleted ? 'white' : 'var(--secondary-color)'};
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                font-size: 1.25rem;
                                margin: 0 auto 1rem;
                                box-shadow: ${isCurrent ? '0 0 20px var(--primary-glow)' : 'none'};
                                animation: ${isCurrent ? 'pulse 2s ease-in-out infinite' : 'none'};
                            ">
                                <i class="fas ${step.icon}"></i>
                            </div>
                            <p style="
                                font-size: 0.875rem;
                                font-weight: ${isCurrent ? '700' : '600'};
                                color: ${isCompleted ? 'var(--dark-color)' : 'var(--secondary-color)'};
                                margin-bottom: 0.25rem;
                            ">${step.label}</p>
                            <p style="
                                font-size: 0.75rem;
                                color: var(--secondary-color);
                            ">${step.description}</p>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
            <!-- Tracking Timeline -->
            <div class="card reveal" style="animation-delay: 0.1s;">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-history" style="color: var(--primary-color);"></i> Tracking History</h2>
                </div>

                <div class="tracking-timeline" style="padding-left: 1.5rem;">
                    ${parcel.tracking_history && parcel.tracking_history.length > 0
                        ? parcel.tracking_history.map((event, index) => `
                            <div class="tracking-event ${index === 0 ? '' : 'completed'}" style="
                                opacity: 0;
                                animation: fadeInLeft 0.5s ease-out ${index * 0.1}s forwards;
                            ">
                                <div class="tracking-event-header" style="flex-wrap: wrap; gap: 0.5rem;">
                                    <span class="tracking-event-status" style="display: flex; align-items: center; gap: 0.5rem;">
                                        <i class="fas ${getStatusIcon(event.status)}" style="color: ${index === 0 ? 'var(--primary-color)' : 'var(--success-color)'};"></i>
                                        ${formatStatus(event.status)}
                                    </span>
                                    <span class="tracking-event-time" style="font-size: 0.8rem; background: var(--light-color); padding: 0.25rem 0.75rem; border-radius: var(--radius-full);">
                                        ${formatDateTime(event.timestamp)}
                                    </span>
                                </div>
                                ${event.location ? `
                                    <div class="tracking-event-location">
                                        <i class="fas fa-map-marker-alt" style="color: var(--danger-color);"></i> ${event.location}
                                    </div>
                                ` : ''}
                                ${event.description ? `
                                    <div class="tracking-event-description">${event.description}</div>
                                ` : ''}
                            </div>
                        `).join('')
                        : '<p style="color: var(--secondary-color); text-align: center; padding: 2rem;">No tracking history available</p>'
                    }
                </div>
            </div>

            <!-- Parcel Details -->
            <div class="card reveal" style="animation-delay: 0.2s;">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-info-circle" style="color: var(--primary-color);"></i> Parcel Details</h2>
                </div>

                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div class="info-item">
                        <span class="info-label">Weight</span>
                        <span class="info-value" style="display: flex; align-items: center; gap: 0.5rem;">
                            <i class="fas fa-weight-hanging" style="color: var(--primary-color);"></i>
                            ${parcel.weight} kg
                        </span>
                    </div>

                    ${parcel.dimensions ? `
                        <div class="info-item">
                            <span class="info-label">Dimensions</span>
                            <span class="info-value" style="display: flex; align-items: center; gap: 0.5rem;">
                                <i class="fas fa-ruler-combined" style="color: var(--primary-color);"></i>
                                ${parcel.dimensions}
                            </span>
                        </div>
                    ` : ''}

                    ${parcel.category ? `
                        <div class="info-item">
                            <span class="info-label">Category</span>
                            <span class="info-value" style="display: flex; align-items: center; gap: 0.5rem;">
                                <i class="fas fa-tag" style="color: var(--primary-color);"></i>
                                ${capitalizeFirst(parcel.category)}
                            </span>
                        </div>
                    ` : ''}

                    <div class="info-item">
                        <span class="info-label">Shipping Cost</span>
                        <span class="info-value" style="display: flex; align-items: center; gap: 0.5rem;">
                            <i class="fas fa-dollar-sign" style="color: var(--success-color);"></i>
                            ${parcel.shipping_cost ? '$' + parcel.shipping_cost.toFixed(2) : 'N/A'}
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Created</span>
                        <span class="info-value" style="display: flex; align-items: center; gap: 0.5rem;">
                            <i class="fas fa-calendar" style="color: var(--primary-color);"></i>
                            ${formatDateTime(parcel.created_at)}
                        </span>
                    </div>

                    <hr style="border: none; border-top: 1px solid var(--border-color); margin: 0.5rem 0;">

                    <div class="info-item">
                        <span class="info-label">Sender</span>
                        <span class="info-value" style="display: flex; align-items: center; gap: 0.5rem;">
                            <i class="fas fa-user" style="color: var(--info-color);"></i>
                            ${parcel.sender ? parcel.sender.full_name : 'Unknown'}
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Receiver</span>
                        <span class="info-value" style="display: flex; align-items: center; gap: 0.5rem;">
                            <i class="fas fa-user" style="color: var(--warning-color);"></i>
                            ${parcel.receiver ? parcel.receiver.full_name : 'Unknown'}
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Pickup Address</span>
                        <span class="info-value" style="font-size: 0.85rem;">
                            <i class="fas fa-map-pin" style="color: var(--danger-color); margin-right: 0.5rem;"></i>
                            ${parcel.pickup_address}
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Delivery Address</span>
                        <span class="info-value" style="font-size: 0.85rem;">
                            <i class="fas fa-flag-checkered" style="color: var(--success-color); margin-right: 0.5rem;"></i>
                            ${parcel.delivery_address}
                        </span>
                    </div>
                </div>
            </div>
        </div>
    `;

    // Add fadeInLeft keyframes if not present
    if (!document.getElementById('fadeInLeft-style')) {
        const style = document.createElement('style');
        style.id = 'fadeInLeft-style';
        style.textContent = `
            @keyframes fadeInLeft {
                from {
                    opacity: 0;
                    transform: translateX(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            @keyframes pulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.05); }
            }
        `;
        document.head.appendChild(style);
    }
}

function getStatusIcon(status) {
    const icons = {
        'pending': 'fa-clock',
        'picked_up': 'fa-hand-holding',
        'in_transit': 'fa-truck',
        'out_for_delivery': 'fa-shipping-fast',
        'delivered': 'fa-check-circle',
        'cancelled': 'fa-times-circle'
    };
    return icons[status] || 'fa-circle';
}

function formatStatus(status) {
    const statusMap = {
        'pending': 'Pending',
        'picked_up': 'Picked Up',
        'in_transit': 'In Transit',
        'out_for_delivery': 'Out for Delivery',
        'delivered': 'Delivered',
        'cancelled': 'Cancelled'
    };
    return statusMap[status] || status;
}

function formatDateTime(dateString) {
    if (!dateString) return 'N/A';
    return new Date(dateString).toLocaleString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function capitalizeFirst(str) {
    if (!str) return '';
    return str.charAt(0).toUpperCase() + str.slice(1);
}

function showAlert(message, type) {
    const container = document.getElementById('alert-container');
    const alert = document.createElement('div');
    alert.className = `alert alert-${type}`;
    alert.style.animation = 'fadeInUp 0.4s ease-out';
    alert.innerHTML = message;

    container.innerHTML = '';
    container.appendChild(alert);

    setTimeout(() => {
        alert.style.animation = 'fadeOut 0.4s ease-out forwards';
        setTimeout(() => alert.remove(), 400);
    }, 5000);
}

// Add fadeOut keyframes if not present
if (!document.getElementById('fadeOut-style')) {
    const style = document.createElement('style');
    style.id = 'fadeOut-style';
    style.textContent = `
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }
    `;
    document.head.appendChild(style);
}
</script>
{% endblock %}
