{% extends "base.html" %}
{% block title %}Track Parcel - Parcel Management System{% endblock %}
{% block content %}
<div class="container">
  <!-- Search Section -->
  <div class="card reveal" style="margin-top:1rem;text-align:center">
    <div style="max-width:580px;margin:0 auto">
      <div style="width:80px;height:80px;margin:0 auto var(--s5);border-radius:1.4rem;background:linear-gradient(135deg,#d4891a,#f5c56b);display:grid;place-items:center;font-size:2.2rem;color:#fff;box-shadow:0 12px 28px rgba(212,137,26,.28);animation:floaty 5s ease-in-out infinite">
        <i class="fas fa-search-location"></i>
      </div>
      <h1 style="font-size:var(--text-xl);font-weight:900;margin-bottom:.4rem">Track Your Parcel</h1>
      <p style="color:var(--text-muted);margin-bottom:1.75rem">Enter your tracking number to see the latest status and location</p>

      <div id="alert-container"></div>

      <form id="track-form" style="max-width:480px;margin:0 auto">
        <div class="search-box">
          <div style="flex:1;position:relative">
            <i class="fas fa-barcode" style="position:absolute;left:1.1rem;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:1.1rem;pointer-events:none"></i>
            <input type="text" id="trackingnumber" name="trackingnumber" placeholder="e.g. TRK123456789ABC" required
              style="width:100%;min-height:52px;padding:.9rem 1rem .9rem 3rem;border:1.5px solid var(--border);border-radius:var(--r-lg);background:#fff;font-size:var(--text-base);transition:border-color var(--t),box-shadow var(--t)">
          </div>
          <button type="submit" class="btn btn-primary" style="flex-shrink:0">
            <i class="fas fa-search"></i> Track
          </button>
        </div>
      </form>

      <!-- Recent Searches -->
      <div id="recent-searches" style="margin-top:1.25rem;display:none">
        <p style="color:var(--text-muted);font-size:var(--text-xs);margin-bottom:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Recent Searches</p>
        <div id="recent-searches-list" style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap"></div>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="tracking-results"></div>
</div>
{% endblock %}
{% block extrajs %}
<script>
const RECENT_KEY = 'parcel_recent_searches';
const MAX_RECENT = 5;

document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const num = params.get('number');
  if (num) { document.getElementById('trackingnumber').value = num; trackParcel(num); }
  loadRecentSearches();
});

document.getElementById('track-form').addEventListener('submit', e => {
  e.preventDefault();
  const num = document.getElementById('trackingnumber').value.trim();
  if (num) trackParcel(num);
});

function loadRecentSearches() {
  const searches = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
  const wrap = document.getElementById('recent-searches');
  const list = document.getElementById('recent-searches-list');
  if (!searches.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = searches.map(n => `<button onclick="trackParcel('${n}');document.getElementById('trackingnumber').value='${n}'" style="padding:.4rem .9rem;background:var(--surface-soft);border:1px solid var(--border);border-radius:var(--r-full);font-size:var(--text-xs);cursor:pointer;font-weight:600;color:var(--text-muted);transition:var(--t)" onmouseover="this.style.background='var(--primary-soft)';this.style.color='var(--primary)'" onmouseout="this.style.background='var(--surface-soft)';this.style.color='var(--text-muted)'"><i class="fas fa-history"></i> ${n}</button>`).join('');
}

function addRecentSearch(num) {
  let s = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
  s = s.filter(x => x !== num);
  s.unshift(num);
  s = s.slice(0, MAX_RECENT);
  localStorage.setItem(RECENT_KEY, JSON.stringify(s));
  loadRecentSearches();
}

async function trackParcel(num) {
  const token = localStorage.getItem('token');
  const c = document.getElementById('tracking-results');
  c.innerHTML = `<div class="card reveal" style="margin-top:1rem"><div class="loading-pulse"><span></span><span></span><span></span></div><p style="text-align:center;color:var(--text-muted);padding-bottom:1.5rem">Tracking your parcel…</p></div>`;
  try {
    const headers = token ? {Authorization:'Bearer '+token} : {};
    const res = await fetch(`/api/parcels/track/${num}`, {headers});
    if (res.ok) { addRecentSearch(num); displayResult(await res.json()); }
    else if (res.status === 404) {
      c.innerHTML = `<div class="card reveal" style="margin-top:1rem;text-align:center;padding:2.5rem"><div class="empty-state-icon"><i class="fas fa-box-open"></i></div><h3>Parcel Not Found</h3><p>We couldn't find a parcel with tracking number <strong class="font-mono">${num}</strong></p><button class="btn btn-primary mt-4" onclick="document.getElementById('trackingnumber').focus()"><i class="fas fa-search"></i> Try Again</button></div>`;
    } else if (res.status === 403) {
      showAlert('You are not authorized to track this parcel. Please login.', 'warning');
      c.innerHTML = '';
    } else throw new Error();
  } catch {
    c.innerHTML = `<div class="card reveal" style="margin-top:1rem;text-align:center;padding:2.5rem"><div class="empty-state-icon" style="color:var(--danger)"><i class="fas fa-exclamation-circle"></i></div><h3>Error</h3><p>An error occurred while tracking. Please try again.</p><button class="btn btn-primary mt-4" onclick="trackParcel('${num}')"><i class="fas fa-sync"></i> Retry</button></div>`;
  }
}

function displayResult(p) {
  const steps = [
    {status:'pending',    label:'Pending',          icon:'fa-clock',          desc:'Order received'},
    {status:'pickedup',   label:'Picked Up',         icon:'fa-hand-holding',   desc:'Parcel collected'},
    {status:'intransit',  label:'In Transit',        icon:'fa-truck',          desc:'On the way'},
    {status:'outfordelivery', label:'Out for Delivery', icon:'fa-shipping-fast', desc:'Arriving today'},
    {status:'delivered',  label:'Delivered',         icon:'fa-check-circle',   desc:'Successfully delivered'},
  ];
  const curIdx = steps.findIndex(s => s.status === p.status);
  const c = document.getElementById('tracking-results');
  c.innerHTML = `
  <div class="card reveal" style="margin-top:1rem">
    <div class="card-header">
      <div>
        <span class="badge badge-${p.status}" style="font-size:var(--text-sm);padding:.5rem 1rem">
          <i class="fas ${sIcon(p.status)}"></i> ${sLabel(p.status)}
        </span>
        <p style="margin-top:.6rem;color:var(--text-muted);font-size:var(--text-sm)">Tracking <strong class="font-mono" style="color:var(--text)">${p.trackingnumber}</strong></p>
      </div>
      <div style="text-align:right">
        <p style="font-size:var(--text-xs);color:var(--text-faint);margin-bottom:.2rem">Estimated Delivery</p>
        <p style="font-weight:700"><i class="fas fa-calendar-alt" style="color:var(--primary);margin-right:.4rem"></i>${p.estimateddelivery || 'Calculating…'}</p>
      </div>
    </div>
    <!-- Status Steps -->
    <div class="status-progress">
      ${steps.map((step, i) => {
        const done = i < curIdx, curr = i === curIdx;
        return `<div class="status-step ${done?'completed':''} ${curr?'current':''}">
          <div class="status-step-icon"><i class="fas ${step.icon}"></i></div>
          <p style="font-size:var(--text-xs);font-weight:${curr?'800':'600'};margin:0">${step.label}</p>
          <p style="font-size:var(--text-xs);color:var(--text-faint);margin:0">${step.desc}</p>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div style="display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-top:1rem" class="tracking-grid">
    <!-- Timeline -->
    <div class="card reveal">
      <div class="card-header"><h2 class="card-title"><i class="fas fa-history"></i> Tracking History</h2></div>
      ${p.trackinghistory && p.trackinghistory.length ? `<div class="tracking-timeline">
        ${p.trackinghistory.map((ev, i) => `<div class="tracking-event ${i>0?'completed':''}" style="animation-delay:${i*.1}s">
          <div class="tracking-event-header">
            <span class="tracking-event-status"><i class="fas ${sIcon(ev.status)}" style="color:${i===0?'var(--primary)':'var(--success)'}"></i> ${sLabel(ev.status)}</span>
            <span class="tracking-event-time">${fmtDateTime(ev.timestamp)}</span>
          </div>
          ${ev.location ? `<div class="tracking-event-location"><i class="fas fa-map-marker-alt" style="color:var(--danger)"></i> ${ev.location}</div>` : ''}
          ${ev.description ? `<div class="tracking-event-description">${ev.description}</div>` : ''}
        </div>`).join('')}
      </div>` : '<p style="color:var(--text-muted);text-align:center;padding:2rem">No tracking history available</p>'}
    </div>

    <!-- Parcel Details -->
    <div class="card reveal">
      <div class="card-header"><h2 class="card-title"><i class="fas fa-info-circle"></i> Details</h2></div>
      <div style="display:flex;flex-direction:column;gap:.65rem">
        <div class="info-item"><span class="info-label">Weight</span><span class="info-value"><i class="fas fa-weight-hanging" style="color:var(--primary)"></i> ${p.weight} kg</span></div>
        ${p.dimensions ? `<div class="info-item"><span class="info-label">Dimensions</span><span class="info-value"><i class="fas fa-ruler-combined" style="color:var(--primary)"></i> ${p.dimensions}</span></div>` : ''}
        ${p.category ? `<div class="info-item"><span class="info-label">Category</span><span class="info-value"><i class="fas fa-tag" style="color:var(--primary)"></i> ${cap(p.category)}</span></div>` : ''}
        <div class="info-item"><span class="info-label">Shipping Cost</span><span class="info-value"><i class="fas fa-dollar-sign" style="color:var(--success)"></i> ${p.shippingcost ? '$'+p.shippingcost.toFixed(2) : 'N/A'}</span></div>
        <div class="info-item"><span class="info-label">Created</span><span class="info-value"><i class="fas fa-calendar" style="color:var(--primary)"></i> ${fmtDateTime(p.createdat)}</span></div>
        <hr style="border:none;border-top:1px solid var(--divider)">
        <div class="info-item"><span class="info-label">Sender</span><span class="info-value"><i class="fas fa-user" style="color:var(--info)"></i> ${p.sender?.fullname || 'Unknown'}</span></div>
        <div class="info-item"><span class="info-label">Receiver</span><span class="info-value"><i class="fas fa-user" style="color:var(--warning)"></i> ${p.receiver?.fullname || 'Unknown'}</span></div>
        <div class="info-item"><span class="info-label">Pickup</span><span class="info-value" style="font-size:var(--text-xs)"><i class="fas fa-map-pin" style="color:var(--danger)"></i> ${p.pickupaddress}</span></div>
        <div class="info-item"><span class="info-label">Delivery</span><span class="info-value" style="font-size:var(--text-xs)"><i class="fas fa-flag-checkered" style="color:var(--success)"></i> ${p.deliveryaddress}</span></div>
      </div>
    </div>
  </div>`;

  // Make tracking grid responsive
  const grid = c.querySelector('.tracking-grid');
  if (window.innerWidth < 768) grid.style.gridTemplateColumns = '1fr';
  window.addEventListener('resize', () => {
    grid.style.gridTemplateColumns = window.innerWidth < 768 ? '1fr' : '2fr 1fr';
  }, {passive:true});
}

const sIcon = s=>({pending:'fa-clock',pickedup:'fa-hand-holding',intransit:'fa-truck',outfordelivery:'fa-shipping-fast',delivered:'fa-check-circle',cancelled:'fa-times-circle'}[s]||'fa-circle');
const sLabel = s=>({pending:'Pending',pickedup:'Picked Up',intransit:'In Transit',outfordelivery:'Out for Delivery',delivered:'Delivered',cancelled:'Cancelled'}[s]||s);
const fmtDateTime = d => d ? new Date(d).toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : 'N/A';
const cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : '';

function showAlert(msg, type) {
  const c = document.getElementById('alert-container');
  c.innerHTML = `<div class="alert alert-${type}" style="margin-bottom:1rem">${msg}</div>`;
  setTimeout(()=>c.innerHTML='', 5000);
}
</script>
{% endblock %}
