{% extends "base.html" %}
{% block title %}My Parcels - Parcel Management System{% endblock %}
{% block content %}
<div class="container">
  <div class="card reveal">
    <div class="card-header">
      <div>
        <h1 class="card-title"><i class="fas fa-box"></i> My Parcels</h1>
        <p class="card-subtitle">Manage and track all your parcels</p>
      </div>
      <a href="/create-parcel" class="btn btn-primary"><i class="fas fa-plus"></i> New Parcel</a>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs reveal" style="margin-top:1rem">
    <button class="filter-tab active" data-filter="all"><i class="fas fa-th-large"></i> All Parcels</button>
    <button class="filter-tab" data-filter="sent"><i class="fas fa-arrow-up"></i> Sent</button>
    <button class="filter-tab" data-filter="received"><i class="fas fa-arrow-down"></i> Received</button>
  </div>

  <!-- Parcels Table -->
  <div class="card reveal" style="margin-top:1rem">
    <div id="parcels-container">
      <div class="loading-pulse"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- Stats Summary -->
  <div class="stats-grid stagger-children" style="margin-top:1rem">
    <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-box"></i></div><div class="stat-info"><h3 id="total-parcels">0</h3><p>Total Parcels</p></div></div>
    <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-clock"></i></div><div class="stat-info"><h3 id="pending-parcels">0</h3><p>Pending</p></div></div>
    <div class="stat-card"><div class="stat-icon purple"><i class="fas fa-truck"></i></div><div class="stat-info"><h3 id="in-transit-parcels">0</h3><p>In Transit</p></div></div>
    <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h3 id="delivered-parcels">0</h3><p>Delivered</p></div></div>
  </div>
</div>
{% endblock %}
{% block extrajs %}
<script>
let allParcels = [], currentFilter = 'all';

document.addEventListener('DOMContentLoaded', () => { loadParcels(); setupFilters(); });

function setupFilters() {
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      applyFilter();
    });
  });
}

async function loadParcels() {
  const token = localStorage.getItem('token');
  if (!token) { window.location.href = '/login'; return; }
  const c = document.getElementById('parcels-container');
  try {
    const [sRes, rRes] = await Promise.all([
      fetch('/api/parcels/sent', {headers:{Authorization:'Bearer '+token}}),
      fetch('/api/parcels/received', {headers:{Authorization:'Bearer '+token}})
    ]);
    if (sRes.ok && rRes.ok) {
      const sent = await sRes.json(), recv = await rRes.json();
      allParcels = [...sent.map(p=>({...p,parcelType:'sent'})), ...recv.map(p=>({...p,parcelType:'received'}))];
      allParcels.sort((a,b) => new Date(b.createdat) - new Date(a.createdat));
      updateStats(); applyFilter();
    } else if (sRes.status===401 || rRes.status===401) { window.location.href='/login'; }
    else throw new Error();
  } catch {
    c.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle empty-state-icon" style="color:var(--danger)"></i><h3>Failed to load parcels</h3><button class="btn btn-primary mt-4" onclick="loadParcels()"><i class="fas fa-sync"></i> Retry</button></div>`;
  }
}

function updateStats() {
  const total = allParcels.length;
  const pending = allParcels.filter(p=>p.status==='pending').length;
  const transit = allParcels.filter(p=>['pickedup','intransit','outfordelivery'].includes(p.status)).length;
  const delivered = allParcels.filter(p=>p.status==='delivered').length;
  animNum('total-parcels', total); animNum('pending-parcels', pending);
  animNum('in-transit-parcels', transit); animNum('delivered-parcels', delivered);
}

function animNum(id, end) {
  const el = document.getElementById(id);
  let cur = 0, step = Math.max(1, Math.ceil(end/30));
  const t = setInterval(() => { cur = Math.min(cur+step, end); el.textContent = cur; if(cur>=end) clearInterval(t); }, 30);
}

function applyFilter() {
  const filtered = currentFilter==='all' ? allParcels : allParcels.filter(p=>p.parcelType===currentFilter);
  displayParcels(filtered);
}

function displayParcels(parcels) {
  const c = document.getElementById('parcels-container');
  if (!parcels.length) {
    const filterMsg = currentFilter==='all' ? 'Send your first parcel to get started' : 'No parcels in this category';
    c.innerHTML = `<div class="empty-state"><i class="fas fa-box-open empty-state-icon"></i><h3>No parcels found</h3><p>${escapeHtml(filterMsg)}</p>${currentFilter==='all'?'<a href="/create-parcel" class="btn btn-primary mt-4">Send Your First Parcel</a>':''}</div>`;
    return;
  }
  // Escape user-controlled data to prevent XSS
  const safeParcels = parcels.map(p => ({
    ...p,
    trackingnumber: escapeHtml(p.trackingnumber),
    status: escapeHtml(p.status),
    weight: escapeHtml(String(p.weight)),
    shippingcost: p.shippingcost ? '$'+p.shippingcost.toFixed(2) : '—',
    createdat: escapeHtml(String(p.createdat)),
    parcelType: escapeHtml(p.parcelType)
  }));
  c.innerHTML = `<div class="table-container"><table class="table"><thead><tr><th>Tracking</th><th>Type</th><th>Status</th><th>Weight</th><th>Cost</th><th>Date</th><th>Action</th></tr></thead><tbody>
${safeParcels.map((p,i)=>`<tr style="animation:fadeSlideIn .4s ${i*.05}s both">
<td><span class="font-mono">${p.trackingnumber}</span></td>
<td><span class="badge" style="background:${p.parcelType==='sent'?'var(--info-soft)':'#ffe8f5'};color:${p.parcelType==='sent'?'#2060c8':'#be185d'}"><i class="fas ${p.parcelType==='sent'?'fa-arrow-up':'fa-arrow-down'}"></i> ${p.parcelType==='sent'?'Sent':'Received'}</span></td>
<td><span class="badge badge-${p.status}"><i class="fas ${sIcon(p.status)}"></i> ${sLabel(p.status)}</span></td>
<td>${p.weight} kg</td><td>${p.shippingcost}</td>
<td>${fmtDate(p.createdat)}</td>
<td><a href="/track?number=${encodeURIComponent(p.trackingnumber)}" class="btn btn-secondary btn-sm"><i class="fas fa-eye"></i> View</a></td>
</tr>`).join('')}
</tbody></table></div>`;
}
const sIcon = s=>({pending:'fa-clock',pickedup:'fa-hand-holding',intransit:'fa-truck',outfordelivery:'fa-shipping-fast',delivered:'fa-check-circle',cancelled:'fa-times-circle'}[s]||'fa-circle');
const sLabel = s=>({pending:'Pending',pickedup:'Picked Up',intransit:'In Transit',outfordelivery:'Out for Delivery',delivered:'Delivered',cancelled:'Cancelled'}[s]||s);
const fmtDate = d=>new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
</script>
{% endblock %}
